<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ABB1B4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="献立メモ" />
  <title>1週間の献立メモ</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="prevWeekBtn" class="nav-btn" type="button" aria-label="前の週">‹</button>
      <h1 id="weekRange" class="week-range">4/19 〜 4/25</h1>
      <button id="nextWeekBtn" class="nav-btn" type="button" aria-label="次の週">›</button>
    </header>

    <div class="today-nav-wrap">
      <button id="thisWeekBtn" class="today-nav-btn" type="button">今週</button>
    </div>

    <div class="status-wrap">
      <span id="holidaySourceBadge" class="status-badge">祝日: 読み込み中</span>
    </div>

    <section class="shopping-section">
      <div class="section-label shopping-label">買い物リスト</div>
      <button id="shoppingBox" class="shopping-box tappable" type="button" aria-label="買い物リストを編集"></button>
      <p class="hint">タップすると1食材ずつ追加・削除・チェック・並び替えができます。買い物リストは全ての週で共通です。</p>
    </section>

    <section class="planner">
      <div class="planner-head">
        <div></div>
        <div class="meal-title" aria-label="昼">☀️</div>
        <div class="meal-title" aria-label="夜">🌙</div>
      </div>
      <div id="plannerBody" class="planner-body"></div>
    </section>
  </main>

  <div id="editorModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <h2 id="editorTitle" class="modal-title">編集</h2>
      <textarea id="editorTextarea" class="editor-textarea" placeholder="ここに入力"></textarea>
      <div class="modal-actions">
        <button id="deleteBtn" class="secondary-btn" type="button">削除</button>
        <button id="cancelBtn" class="secondary-btn" type="button">閉じる</button>
        <button id="saveBtn" class="primary-btn" type="button">保存</button>
      </div>
    </div>
  </div>

  <div id="shoppingModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="shopping"></div>
    <div class="modal-card shopping-modal-card" role="dialog" aria-modal="true" aria-labelledby="shoppingTitle">
      <div class="shopping-modal-head">
        <h2 id="shoppingTitle" class="modal-title">買い物リストを編集</h2>
        <button id="shoppingCloseBtn" class="secondary-btn" type="button">閉じる</button>
      </div>

      <div class="shopping-add-box">
        <label class="shopping-add-label" for="shoppingItemInput">新しいアイテムを追加</label>
        <div class="shopping-add-row">
          <input id="shoppingItemInput" class="shopping-input" type="text" placeholder="例：玉ねぎ" />
          <button id="shoppingAddBtn" class="primary-btn add-item-btn" type="button">追加</button>
        </div>
      </div>

      <div class="shopping-list-title">買い物リスト</div>
      <div class="shopping-sort-hint">並び替えたい行を長押しまたはドラッグして移動できます。</div>
      <div id="shoppingItemsList" class="shopping-items-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
